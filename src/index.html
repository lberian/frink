<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Imagen congelada de la pantalla (fondo) -->
    <img id="bg" alt="" />
    <!-- Lienzo donde se dibuja la tinta (resolución física) -->
    <canvas id="board"></canvas>
    <!-- Marco salmón de la zona seleccionada -->
    <div id="selection" hidden></div>

    <!-- Panel del modo lámina: ventana pequeña y manejable para elegir/soltar imagen -->
    <div id="droppanel" hidden>
      <div class="dp-bar" data-tauri-drag-region>
        <span class="dp-title">Frink — anotar imagen</span>
        <button id="dp-min" title="Minimizar">–</button>
        <button id="dp-close" title="Cerrar (Esc)">✕</button>
      </div>
      <div class="dp-box">
        <div class="dp-icon">🖼️</div>
        <p><strong>Suelta aquí una imagen</strong><br />o haz clic para elegirla</p>
        <p class="dp-small">
          Mueve esta ventana desde la barra superior o minimízala<br />
          para buscar tu archivo · al cargar la imagen se abrirá a pantalla completa
        </p>
      </div>
    </div>
    <input type="file" id="fileinput" accept="image/*" hidden />

    <!-- Mensaje de la IA cuando pide una anotación (conector MCP) -->
    <div id="mcpprompt" hidden></div>

    <!-- Barra de herramientas -->
    <div id="toolbar">
      <button data-tool="pen" title="Lápiz (1)">
        <svg viewBox="0 0 24 24"><path d="M3 21l3.6-.9L20 6.7a2.1 2.1 0 0 0-3-3L3.6 17.1 3 21z"/><path d="M14.5 6.2l3.3 3.3"/></svg>
      </button>
      <button data-tool="marker" title="Rotulador (2)">
        <svg viewBox="0 0 24 24"><path d="M9.5 14.5L18 6a2.1 2.1 0 0 1 3 3l-8.5 8.5-4.2 1.2 1.2-4.2z"/><path d="M3 21h8"/></svg>
      </button>
      <button data-tool="poly" title="Trazado recto por puntos (3)">
        <svg viewBox="0 0 24 24"><path d="M4 19l6-10 5 6 5-11"/><circle cx="4" cy="19" r="1.7" class="dot"/><circle cx="10" cy="9" r="1.7" class="dot"/><circle cx="15" cy="15" r="1.7" class="dot"/><circle cx="20" cy="4" r="1.7" class="dot"/></svg>
      </button>
      <button data-tool="spline" title="Spline por puntos (4)">
        <svg viewBox="0 0 24 24"><path d="M3.5 18.5C7 7 11 21 15 12s3-7 5.5-6.5"/><circle cx="3.5" cy="18.5" r="1.7" class="dot"/><circle cx="12" cy="14" r="1.7" class="dot"/><circle cx="20.5" cy="5.5" r="1.7" class="dot"/></svg>
      </button>
      <button data-tool="rect" title="Rectángulo (5)">
        <svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1.5"/></svg>
      </button>
      <button data-tool="ellipse" title="Elipse (6)">
        <svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8.5" ry="6.5"/></svg>
      </button>
      <button data-tool="text" title="Texto (7)">
        <svg viewBox="0 0 24 24"><path d="M5 7V5h14v2M12 5v14M9.5 19h5"/></svg>
      </button>
      <button data-tool="erase" title="Goma (8)">
        <svg viewBox="0 0 24 24"><path d="M8 17l-4-4a1.6 1.6 0 0 1 0-2.2l7.5-7.5a1.6 1.6 0 0 1 2.2 0l5 5a1.6 1.6 0 0 1 0 2.2L13.5 16"/><path d="M8 17h12"/><path d="M4 21h16"/></svg>
      </button>
      <button data-tool="dim" title="Cota (9) — dos puntos + distancia real: da escala a la imagen">
        <svg viewBox="0 0 24 24"><path d="M3.5 15h17M3.5 11v8M20.5 11v8M8.5 6h7"/></svg>
      </button>
      <span class="sep"></span>
      <button id="fill" title="Relleno sí/no (F) — afecta a rectángulo y elipse">
        <svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="2" class="fillbox"/></svg>
      </button>
      <button id="orders" title="Órdenes para la IA — borra, aclara, reemplaza, guías de perspectiva…">
        <svg viewBox="0 0 24 24"><path d="M12.5 2.5L5 13.5h5L8.5 21.5 19 10.5h-5l1.5-8z"/></svg>
      </button>
      <span class="sep"></span>
      <button class="swatch" data-color="#ff6f8b" style="background:#ff6f8b" title="Salmón"></button>
      <button class="swatch" data-color="#e53935" style="background:#e53935" title="Rojo"></button>
      <button class="swatch" data-color="#ffd600" style="background:#ffd600" title="Amarillo"></button>
      <button class="swatch" data-color="#43a047" style="background:#43a047" title="Verde"></button>
      <button class="swatch" data-color="#1e88e5" style="background:#1e88e5" title="Azul"></button>
      <button class="swatch" data-color="#111111" style="background:#111111" title="Negro"></button>
      <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="Blanco"></button>
      <span class="sep"></span>
      <input type="range" id="size" min="1" max="24" step="1" value="5" title="Grosor" />
      <span id="sizeval">5</span>
      <span class="sep"></span>
      <button id="undo" title="Deshacer (Ctrl+Z)">
        <svg viewBox="0 0 24 24"><path d="M8 5L4 9l4 4"/><path d="M4 9h9.5a6 6 0 1 1 0 12H10"/></svg>
      </button>
      <button id="rezone" title="Elegir otra zona (R)">
        <svg viewBox="0 0 24 24"><rect x="4.5" y="4.5" width="15" height="15" rx="2" stroke-dasharray="4 3"/></svg>
      </button>
      <button id="done" title="Exportar (Enter)" class="primary">
        <svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5"/></svg>
      </button>
      <button id="close" title="Ocultar (Esc) — Frink sigue en la bandeja, junto al reloj">
        <svg viewBox="0 0 24 24"><path d="M6.5 6.5l11 11M17.5 6.5l-11 11"/></svg>
      </button>
    </div>

    <!-- Menú de órdenes (se rellena desde main.js) -->
    <div id="ordermenu" hidden></div>

    <!-- Ayuda breve -->
    <div id="hint">
      Arrastra para elegir zona · Enter = capturar · Esc = salir
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
